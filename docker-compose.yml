services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jira}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jira}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config:/app/config
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JIRA_DB_URL: jdbc:postgresql://db:5432/jira
      JIRA_DB_USERNAME: ${JIRA_DB_USERNAME:-jira}
      JIRA_DB_PASSWORD: ${JIRA_DB_PASSWORD:?Set JIRA_DB_PASSWORD}
      JIRA_GITHUB_SECRET: ${JIRA_GITHUB_SECRET:-}
      JIRA_GOOGLE_SECRET: ${JIRA_GOOGLE_SECRET:-}
      JIRA_YANDEX_SECRET: ${JIRA_YANDEX_SECRET:-}
      JIRA_GITLAB_SECRET: ${JIRA_GITLAB_SECRET:-}
      JIRA_MAIL_USER: ${JIRA_MAIL_USER:-}
      JIRA_MAIL_PASSWORD: ${JIRA_MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./resources:/opt/jirarush/resources
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata: